<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside id="theme-studio">
        <h3>Theme Studio</h3>
        <label>Primary Color: <input type="color" id="colorPicker"></label>
        <label>Font: 
            <select id="fontPicker">
                <option value="sans-serif">Sans Serif</option>
                <option value="serif">Serif</option>
                <option value="monospace">Monospace</option>
            </select>
        </label>
    </aside>

    <main id="content">
        <h1>Dynamic Styling</h1>
        <p>Changing these variables cascades through the CSS.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
